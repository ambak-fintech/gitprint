name: Gitprint

on:
  create:
    branches: ['**']
  push:
    branches: ['**']

permissions:
  pull-requests: write
  contents: write

jobs:
  create-pr:
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Draft Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.ref;
            const skip = ['main', 'main', 'master', 'develop', 'pre_release_master'];
            if (skip.includes(branch)) return;

            const title = branch
              .replace(/^(feature|fix|hotfix|bugfix|chore|refactor)\//, '')
              .replace(/[-_]/g, ' ')
              .replace(/^\w/, c => c.toUpperCase());

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                head: branch,
                base: 'main',
                body: `## Auto-generated PR\n\n**Branch:** \`${branch}\`\n**Created by:** @${context.actor}`,
                draft: true,
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, labels: ['auto-pr'],
              });
              console.log(`PR #${pr.number} created`);
            } catch (e) {
              if (e.status === 422) console.log('PR already exists');
              else throw e;
            }

  ai-stats:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Gitprint notes
        run: |
          git fetch origin refs/notes/gitprint:refs/notes/gitprint 2>/dev/null || true

      - name: Post AI Contribution Report
        uses: actions/github-script@v7
        env:
          AI_PLATFORM_URL: ${{ secrets.AI_PLATFORM_URL }}
          AI_PLATFORM_KEY: ${{ secrets.AI_PLATFORM_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');
            const baseBranch = 'main';

            // ─── Skip base branches ───
            const currentBranch = context.ref.replace('refs/heads/', '');
            const skip = [baseBranch, 'main', 'master', 'develop', 'pre_release_master'];
            if (skip.includes(currentBranch)) return;

            // ─── Find PR (retry to allow create-pr job to finish) ───
            let pr;
            for (let attempt = 0; attempt < 4; attempt++) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner, repo: context.repo.repo,
                head: `${context.repo.owner}:${currentBranch}`, state: 'open',
              });
              pr = prs[0];
              if (pr) break;
              if (attempt < 3) {
                console.log(`No open PR found, retrying in 10s (${attempt + 1}/3)...`);
                await new Promise(r => setTimeout(r, 10000));
              }
            }
            if (!pr) { console.log('No open PR found'); return; }

            // ─── Read all Gitprint notes from PR commits ───
            let commits;
            let commitDetails = [];
            try {
              const commitLog = execSync(
                `git log origin/${baseBranch}..HEAD --format="%H|||%s|||%an|||%aI"`,
                { encoding: 'utf8' }
              ).trim().split('\n').filter(Boolean);
              commits = commitLog.map(l => l.split('|||')[0]);
              commitDetails = commitLog.map(l => {
                const [sha, message, author, timestamp] = l.split('|||');
                return { sha, message: message || '', author: author || context.actor, timestamp: timestamp || new Date().toISOString() };
              });
            } catch (e) { console.log('No commits in range'); return; }

            const allSessions = [];
            const allFileStats = {};
            const aiCommitShas = new Set();
            // Per-commit note data for platform payload
            const perCommitNotes = {};

            for (const sha of commits) {
              try {
                const note = execSync(
                  `git notes --ref=gitprint show ${sha} 2>/dev/null`,
                  { encoding: 'utf8' }
                ).trim();
                if (!note) continue;

                const data = JSON.parse(note);
                if ((data.sessions || []).length > 0) aiCommitShas.add(sha);

                // Store per-commit note data for platform payload
                perCommitNotes[sha] = data;

                // Merge sessions (deduplicate by session_id, sum delta tokens)
                for (const s of (data.sessions || [])) {
                  const idx = allSessions.findIndex(x => x.session_id === s.session_id);
                  if (idx === -1) {
                    allSessions.push({ ...s });
                  } else {
                    // Sum delta tokens from this commit into the session aggregate
                    const existing = allSessions[idx];
                    existing.input_tokens = (existing.input_tokens || 0) + (s.input_tokens || 0);
                    existing.output_tokens = (existing.output_tokens || 0) + (s.output_tokens || 0);
                    existing.cache_creation_tokens = (existing.cache_creation_tokens || 0) + (s.cache_creation_tokens || 0);
                    existing.cache_read_tokens = (existing.cache_read_tokens || 0) + (s.cache_read_tokens || 0);
                    existing.estimated_cost = (existing.estimated_cost || 0) + (s.estimated_cost || 0);
                    existing.turns = (existing.turns || 0) + (s.turns || 0);
                    existing.api_calls = (existing.api_calls || 0) + (s.api_calls || 0);
                    // Merge models
                    for (const [model, info] of Object.entries(s.models || {})) {
                      if (!existing.models) existing.models = {};
                      if (!existing.models[model]) existing.models[model] = { input_tokens: 0, output_tokens: 0, api_calls: 0 };
                      existing.models[model].input_tokens += info.input_tokens || 0;
                      existing.models[model].output_tokens += info.output_tokens || 0;
                      existing.models[model].api_calls += info.api_calls || 0;
                    }
                  }
                }

                // Sum file stats (each note is a delta, so simple sum is correct)
                for (const f of (data.ai_files || [])) {
                  if (!allFileStats[f.file]) allFileStats[f.file] = { ai_lines_added: 0, ai_lines_removed: 0 };
                  allFileStats[f.file].ai_lines_added += f.ai_lines_added || 0;
                  allFileStats[f.file].ai_lines_removed += f.ai_lines_removed || 0;
                }
              } catch (e) { /* no note on this commit */ }
            }

            // ─── Token stats ───
            const totalInputTokens = allSessions.reduce((s, x) => s + (x.input_tokens || 0), 0);
            const totalOutputTokens = allSessions.reduce((s, x) => s + (x.output_tokens || 0), 0);
            const totalCacheCreation = allSessions.reduce((s, x) => s + (x.cache_creation_tokens || 0), 0);
            const totalCacheRead = allSessions.reduce((s, x) => s + (x.cache_read_tokens || 0), 0);
            const totalTokens = totalInputTokens + totalOutputTokens + totalCacheCreation + totalCacheRead;
            const totalTurns = allSessions.reduce((s, x) => s + (x.turns || 0), 0);
            const totalApiCalls = allSessions.reduce((s, x) => s + (x.api_calls || x.turns || 0), 0);

            if (allSessions.length === 0 && totalTokens === 0) return;

            // ─── Cost estimation ───
            const pricing = {
              'opus':   { input: 15, output: 75, cache_read: 1.50, cache_creation: 18.75 },
              'sonnet': { input: 3,  output: 15, cache_read: 0.30, cache_creation: 3.75 },
              'haiku':  { input: 1,  output: 5,  cache_read: 0.10, cache_creation: 1.25 },
            };

            const matchPricing = (modelName) => {
              const ml = modelName.toLowerCase();
              if (ml.includes('opus')) return pricing.opus;
              if (ml.includes('sonnet')) return pricing.sonnet;
              if (ml.includes('haiku')) return pricing.haiku;
              return pricing.sonnet;
            };

            // Use pre-calculated cost if available, otherwise estimate from tokens
            let totalCost = 0;
            for (const s of allSessions) {
              if (s.estimated_cost != null) {
                totalCost += s.estimated_cost;
              } else {
                // Fallback: estimate from model aggregates
                for (const [model, info] of Object.entries(s.models || {})) {
                  const p = matchPricing(model);
                  totalCost += (info.input_tokens / 1e6) * p.input;
                  totalCost += (info.output_tokens / 1e6) * p.output;
                }
                const cc = s.cache_creation_tokens || 0;
                const cr = s.cache_read_tokens || 0;
                const dm = Object.keys(s.models || {})[0] || '';
                const dp = matchPricing(dm);
                totalCost += (cc / 1e6) * dp.cache_creation;
                totalCost += (cr / 1e6) * dp.cache_read;
              }
            }
            const fmtCost = (c) => c < 0.01 ? `$${c.toFixed(4)}` : `$${c.toFixed(2)}`;

            // ─── File diff stats ───
            const diff = execSync(
              `git diff --numstat origin/${baseBranch}...HEAD`
            ).toString();

            // Exclude config/tooling files that aren't real code contributions
            const EXCLUDE_PATTERNS = [
              /^\.claude\//,
              /^\.github\//,
              /^\.gitprint\//,
              /^\.cursor\//,
              /^\.vscode\//,
              /^\.idea\//,
            ];
            const isExcluded = (f) => EXCLUDE_PATTERNS.some(p => p.test(f));

            let totalLines = 0, aiLines = 0, humanLines = 0;
            const fileStats = [];

            diff.split('\n').filter(Boolean).forEach(line => {
              const [added, removed, file] = line.split('\t');
              if (isExcluded(file)) return;
              const totalFileLines = (parseInt(added) || 0) + (parseInt(removed) || 0);
              totalLines += totalFileLines;

              // Exact match first, then suffix match for monorepo path mismatches
              let aiStat = allFileStats[file];
              if (!aiStat) {
                const match = Object.keys(allFileStats).find(k => file.endsWith('/' + k) || k.endsWith('/' + file));
                if (match) aiStat = allFileStats[match];
              }
              let fileAiLines = 0;

              if (aiStat) {
                fileAiLines = Math.min(
                  (aiStat.ai_lines_added || 0) + (aiStat.ai_lines_removed || 0),
                  totalFileLines
                );
              }

              const fileHumanLines = totalFileLines - fileAiLines;
              aiLines += fileAiLines;
              humanLines += fileHumanLines;

              const aiPct = totalFileLines > 0 ? Math.round((fileAiLines / totalFileLines) * 100) : 0;
              let attribution = 'human';
              if (aiPct === 100) attribution = 'ai';
              else if (aiPct > 0) attribution = 'shared';

              fileStats.push({
                file, lines: totalFileLines,
                linesAdded: parseInt(added) || 0,
                linesRemoved: parseInt(removed) || 0,
                aiLines: fileAiLines, humanLines: fileHumanLines,
                aiPct, attribution,
              });
            });

            const aiPercent = totalLines > 0 ? Math.round((aiLines / totalLines) * 100) : 0;

            if (aiPercent === 0 && totalTokens === 0) return;

            // ─── Labels ───
            let levelLabel = 'ai: minimal (<25%)';
            if (aiPercent >= 75) levelLabel = 'ai: high (75%+)';
            else if (aiPercent >= 50) levelLabel = 'ai: medium (50-75%)';
            else if (aiPercent >= 25) levelLabel = 'ai: moderate (25-50%)';

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, labels: [levelLabel],
              });
            } catch (e) { console.log('Label error:', e.message); }

            // ─── Helpers ───
            const fmt = n => n > 1000 ? `${(n/1000).toFixed(1)}k` : String(n);

            const makeBar = (pct, len = 20) => {
              const filled = Math.round((pct / 100) * len);
              return '█'.repeat(filled) + '░'.repeat(len - filled);
            };

            const modelIcons = {
              'opus': '🟣', 'sonnet': '🔵', 'haiku': '🟢',
              'gpt': '⚪', 'o1': '🟠', 'o3': '🟠', 'gemini': '🔴',
              'deepseek': '🟤', 'default': '⚫',
            };

            const getIcon = (m) => {
              const ml = m.toLowerCase();
              for (const [k, v] of Object.entries(modelIcons)) {
                if (ml.includes(k)) return v;
              }
              return modelIcons.default;
            };

            const getShortName = (m) => {
              const ml = m.toLowerCase();
              if (ml.includes('opus')) return 'Opus';
              if (ml.includes('sonnet')) return 'Sonnet';
              if (ml.includes('haiku')) return 'Haiku';
              return m.split('/').pop().split('-').slice(0, 3).join('-');
            };

            // ─── Model aggregation ───
            const modelAgg = {};
            for (const s of allSessions) {
              for (const [model, info] of Object.entries(s.models || {})) {
                if (!modelAgg[model]) modelAgg[model] = { input_tokens: 0, output_tokens: 0, api_calls: 0 };
                modelAgg[model].input_tokens += info.input_tokens || 0;
                modelAgg[model].output_tokens += info.output_tokens || 0;
                modelAgg[model].api_calls += info.api_calls || info.turns || 0;
              }
            }

            const modelRows = Object.entries(modelAgg)
              .sort((a, b) => (b[1].input_tokens + b[1].output_tokens) - (a[1].input_tokens + a[1].output_tokens))
              .map(([model, info]) => {
                const total = info.input_tokens + info.output_tokens;
                const pct = totalTokens > 0 ? Math.round((total / totalTokens) * 100) : 0;
                return `| ${getIcon(model)} ${getShortName(model)} | ${fmt(info.input_tokens)} | ${fmt(info.output_tokens)} | ${fmt(total)} | ${info.api_calls} | \`${makeBar(pct)}\` ${pct}% |`;
              }).join('\n');

            // ─── Session rows ───
            const toolIcons = {
              'claude-code': '🟣',
              'cursor': '🔵',
              'copilot': '⚪',
              'gemini': '🔴',
              'windsurf': '🟢',
              'augment': '🟡',
              'opencode': '🟤',
              'default': '🔧',
            };

            const getToolIcon = (t) => toolIcons[t] || toolIcons.default;
            const getToolName = (t) => {
              const names = {
                'claude-code': 'Claude Code', 'gemini': 'Gemini CLI',
                'augment': 'Augment Code', 'copilot': 'Copilot', 'opencode': 'OpenCode',
              };
              return names[t] || t.charAt(0).toUpperCase() + t.slice(1);
            };

            const sessionRows = allSessions
              .sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''))
              .map((s, i) => {
                const sessionModels = Object.keys(s.models || {}).map(m => `${getIcon(m)} ${getShortName(m)}`).join(', ');
                const ts = (s.timestamp || '').slice(0, 16);
                const tool = s.tool || 'claude-code';
                return `| ${i + 1} | ${getToolIcon(tool)} ${getToolName(tool)} | ${ts} | ${fmt(s.input_tokens || 0)} | ${fmt(s.output_tokens || 0)} | ${s.turns || 0} | ${s.api_calls || s.turns || 0} | ${sessionModels} |`;
              }).join('\n');

            // ─── File rows ───
            const fileRows = fileStats
              .sort((a, b) => b.lines - a.lines)
              .map(f => {
                const icon = f.attribution === 'ai' ? '🤖' : f.attribution === 'shared' ? '🤝' : '👤';
                return `| \`${f.file}\` | ${f.lines} | ${f.aiLines} | ${f.humanLines} | ${icon} ${f.aiPct}% AI |`;
              }).join('\n');

            // ─── Build comment ───
            const body = [
              '## 🔍 Gitprint — Contribution Report',
              `\`${makeBar(aiPercent)}\` **${aiPercent}% AI-generated code**\n`,
              '### 📊 Code Stats',
              '| Metric | Lines |',
              '|--------|-------|',
              `| 🤖 AI lines | ${aiLines} |`,
              `| 👤 Human lines | ${humanLines} |`,
              `| **Total** | **${totalLines}** |`,
              '',
              '### 🧠 Models Used',
              '| Model | Input | Output | Total | API calls | Usage |',
              '|-------|-------|--------|-------|-----------|-------|',
              modelRows,
              '',
              '### 🔥 Token Usage',
              '| Metric | Value |',
              '|--------|-------|',
              `| Input tokens | ${fmt(totalInputTokens)} |`,
              `| Output tokens | ${fmt(totalOutputTokens)} |`,
              `| Cache creation | ${fmt(totalCacheCreation)} |`,
              `| Cache read | ${fmt(totalCacheRead)} |`,
              `| **Total tokens** | **${fmt(totalTokens)}** |`,
              `| 💰 Estimated cost | **${fmtCost(totalCost)}** |`,
              `| 🔄 Total turns | ${totalTurns} |`,
              `| 📡 API calls | ${totalApiCalls} |`,
              `| 📋 Sessions | ${allSessions.length} |`,
              '',
              '<details><summary>📋 Session Breakdown</summary>\n',
              '| # | Tool | Timestamp | Input | Output | Turns | API calls | Models |',
              '|---|------|-----------|-------|--------|-------|-----------|--------|',
              sessionRows,
              '\n</details>',
              '',
              '<details><summary>📁 File Attribution</summary>\n',
              '| File | Total | AI | Human | Attribution |',
              '|------|-------|-----|-------|-------------|',
              fileRows,
              '\n</details>',
              '',
              '_Powered by [Gitprint](https://github.com/ambak-fintech/gitprint) — AI code attribution from session transcripts, stored in Git Notes._',
            ].join('\n');

            // ─── Post or update comment ───
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existing = comments.find(c =>
              c.body?.includes('Gitprint') && c.user?.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, body,
              });
            }

            // ─── Post to AI Engineering Platform (if configured) ───
            const platformUrl = process.env.AI_PLATFORM_URL;
            const platformKey = process.env.AI_PLATFORM_KEY;

            if (platformUrl && platformKey) {
              try {
                const platformPayload = {
                  repo: `${context.repo.owner}/${context.repo.repo}`,
                  branch: currentBranch,
                  sender: context.actor,
                  sessions: allSessions,
                  files: fileStats.map(f => ({
                    file: f.file,
                    total_added: f.linesAdded,
                    total_removed: f.linesRemoved,
                    ai_lines_added: f.aiLines,
                    ai_lines_removed: 0,
                    human_lines_added: f.humanLines,
                    human_lines_removed: 0,
                  })),
                  commits: commitDetails.map(c => {
                    // Per-commit files from that commit's own note
                    const note = perCommitNotes[c.sha];
                    const commitAiFiles = note ? (note.ai_files || []) : [];
                    // Get per-commit diff (files changed in this specific commit)
                    let commitFiles = [];
                    try {
                      const cdiff = execSync(`git diff --numstat ${c.sha}^..${c.sha} 2>/dev/null`).toString();
                      cdiff.split('\n').filter(Boolean).forEach(line => {
                        const [added, removed, file] = line.split('\t');
                        if (!file || isExcluded(file)) return;
                        const linesAdded = parseInt(added) || 0;
                        const linesRemoved = parseInt(removed) || 0;
                        // Find AI attribution from this commit's note
                        const aiFile = commitAiFiles.find(f => f.file === file)
                          || commitAiFiles.find(f => file.endsWith('/' + f.file) || f.file.endsWith('/' + file));
                        const aiLines = aiFile
                          ? Math.min((aiFile.ai_lines_added || 0) + (aiFile.ai_lines_removed || 0), linesAdded + linesRemoved)
                          : 0;
                        commitFiles.push({
                          file,
                          total_added: linesAdded,
                          total_removed: linesRemoved,
                          ai_lines_added: aiLines,
                          ai_lines_removed: 0,
                        });
                      });
                    } catch (e) { /* first commit or error — skip per-commit files */ }
                    return {
                      sha: c.sha,
                      message: c.message,
                      author: c.author,
                      timestamp: c.timestamp,
                      hasAi: aiCommitShas.has(c.sha),
                      files: commitFiles,
                    };
                  }),
                  totalCost,
                  totalTokens,
                  tools: [...new Set(allSessions.map(s => s.tool || 'claude-code').filter(Boolean))],
                };

                const res = await fetch(`${platformUrl}/api/ingest/push`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${platformKey}`,
                  },
                  body: JSON.stringify(platformPayload),
                });

                if (res.ok) {
                  const result = await res.json();
                  console.log(`[AI Platform] ✅ Ingested: ${result.commits} commits, ${result.sessions} sessions for ${currentBranch}`);
                } else {
                  const text = await res.text();
                  console.log(`[AI Platform] ⚠️ Response ${res.status}: ${text}`);
                }
              } catch (e) {
                console.log(`[AI Platform] ⚠️ Failed to post to platform: ${e.message}`);
              }
            }
